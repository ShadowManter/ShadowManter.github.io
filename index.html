<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniLog - Universal Media Tracker</title>
    <style>
        :root {
            --bg-main: #0d0e12;
            --bg-card: #161820;
            --border: #262938;
            --text-title: #ffffff;
            --text-body: #9eafc2;
            --accent-movie: #ff4757;
            --accent-music: #1db954;
            --accent-game: #5f27cd;
            --input-bg: #1f2230;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-body);
            margin: 0;
            padding: 0;
        }

        .navbar {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-title);
            letter-spacing: 1px;
        }

        .user-selector {
            background: var(--bg-main);
            color: var(--text-title);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        .app-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 40px;
        }

        .profile-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            height: fit-content;
            margin-bottom: 25px;
        }

        .avatar-frame {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, var(--accent-movie), var(--accent-game));
            border-radius: 50%;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
        }

        .profile-name {
            color: var(--text-title);
            margin: 0 0 5px 0;
            font-size: 1.4rem;
        }

        .profile-handle {
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .form-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
        }

        .form-card h3 {
            margin: 0 0 15px 0;
            color: var(--text-title);
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: var(--text-body);
        }

        .form-input {
            width: 100%;
            box-sizing: border-box;
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-title);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-movie);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-movie), var(--accent-game));
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            transition: opacity 0.2s;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .feed-section h2 {
            color: var(--text-title);
            margin-top: 0;
            font-size: 1.8rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .feed-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .log-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 20px;
            align-items: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .media-icon-indicator {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .icon-movie { background-color: rgba(255, 71, 87, 0.15); color: var(--accent-movie); }
        .icon-music { background-color: rgba(29, 185, 84, 0.15); color: var(--accent-music); }
        .icon-game { background-color: rgba(95, 39, 205, 0.15); color: var(--accent-game); }

        .log-meta h3 {
            margin: 0 0 5px 0;
            color: var(--text-title);
            font-size: 1.2rem;
        }

        .log-subtext {
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .review-text {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">OMNILOG</div>
        <select class="user-selector" id="userSelect" onchange="switchUserProfile()">
            <option value="user1">Alex Rivera</option>
            <option value="user2">Sarah Jenkins</option>
        </select>
    </nav>

    <div class="app-container">
        <aside>
            <div class="profile-card">
                <div class="avatar-frame" id="profileAvatar">👤</div>
                <h2 class="profile-name" id="profileName">Alex Rivera</h2>
                <div class="profile-handle" id="profileHandle">@alex_tracks</div>
            </div>

            <div class="form-card">
                <h3>Log New Activity</h3>
                <div class="form-group">
                    <label>Category</label>
                    <select class="form-input" id="logType">
                        <option value="movie">🎬 Movie</option>
                        <option value="music">🎵 Music</option>
                        <option value="game">🎮 Game</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" class="form-input" id="logTitle" placeholder="e.g. Interstellar">
                </div>
                <div class="form-group">
                    <label>Artist, Platform, or Director</label>
                    <input type="text" class="form-input" id="logMarker" placeholder="e.g. Christopher Nolan">
                </div>
                <div class="form-group">
                    <label>Appraisal Rating</label>
                    <select class="form-input" id="logRating">
                        <option value="★★★★★">★★★★★ (Masterpiece)</option>
                        <option value="★★★★☆">★★★★☆ (Great)</option>
                        <option value="★★★☆☆">★★★☆☆ (Good)</option>
                        <option value="★★☆☆☆">★★☆☆☆ (Mediocre)</option>
                        <option value="★☆☆☆☆">★☆☆☆☆ (Bad)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Short Review Notes</label>
                    <textarea class="form-input" id="logNote" rows="3" placeholder="Write your thoughts..."></textarea>
                </div>
                <button class="submit-btn" onclick="addNewUserLog()">Publish Activity Log</button>
            </div>
        </aside>

        <section class="feed-section">
            <h2>Recent Activity Logs</h2>
            <div class="feed-grid" id="activityFeed"></div>
        </section>
    </div>

    <script>
        const userDatabase = {
            user1: {
                name: "Alex Rivera",
                handle: "@alex_tracks",
                avatar: "🎧",
                logs: [
                    { type: "movie", title: "Inception", marker: "Nolan Cut", rating: "★★★★★", note: "Mind-bending visual setups." },
                    { type: "music", title: "Blinding Lights", marker: "The Weeknd", rating: "★★★★☆", note: "Exceptional retro synth pacing." },
                    { type: "game", title: "Elden Ring", marker: "FromSoftware", rating: "★★★★★", note: "Deeply rewarding loop." }
                ]
            },
            user2: {
                name: "Sarah Jenkins",
                handle: "@sarah_reviews",
                avatar: "🎬",
                logs: [
                    { type: "movie", title: "Interstellar", marker: "Paramount+", rating: "★★★★★", note: "Brilliant organ scores." },
                    { type: "music", title: "Bohemian Rhapsody", marker: "Queen", rating: "★★★★★", note: "A masterclass in vocal design." },
                    { type: "game", title: "Hades", marker: "Supergiant Games", rating: "★★★★☆", note: "Flawless rogue-like action flows." }
                ]
            }
        };

        function renderFeed(userId) {
            const user = userDatabase[userId];
            document.getElementById("profileName").innerText = user.name;
            document.getElementById("profileHandle").innerText = user.handle;
            document.getElementById("profileAvatar").innerText = user.avatar;

            const feedContainer = document.getElementById("activityFeed");
            feedContainer.innerHTML = "";

            user.logs.forEach(log => {
                let iconClass = "";
                let typeEmoji = "";
                if (log.type === "movie") { iconClass = "icon-movie"; typeEmoji = "🎬"; }
                if (log.type === "music") { iconClass = "icon-music"; typeEmoji = "🎵"; }
                if (log.type === "game") { iconClass = "icon-game"; typeEmoji = "🎮"; }

                const cardHtml = `
                    <article class="log-card">
                        <div class="media-icon-indicator ${iconClass}">${typeEmoji}</div>
                        <div class="log-meta">
                            <h3>${log.title} <span style="color: #ffd32a; font-size: 1rem; margin-left: 10px;">${log.rating}</span></h3>
                            <div class="log-subtext">${log.type.toUpperCase()} • ${log.marker}</div>
                            <p class="review-text">${log.note}</p>
                        </div>
                    </article>
                `;
                feedContainer.innerHTML += cardHtml;
            });
        }

        function addNewUserLog() {
            const currentUserId = document.getElementById("userSelect").value;
            const type = document.getElementById("logType").value;
            const title = document.getElementById("logTitle").value.trim();
            const marker = document.getElementById("logMarker").value.trim();
            const rating = document.getElementById("logRating").value;
            const note = document.getElementById("logNote").value.trim();

            if (!title) {
                alert("Please fill out the Title box before logging activity!");
                return;
            }

            userDatabase[currentUserId].logs.unshift({
                type: type,
                title: title,
                marker: marker || "N/A",
                rating: rating,
                note: note || "No additional notes provided."
            });

            renderFeed(currentUserId);

            document.getElementById("logTitle").value = "";
            document.getElementById("logMarker").value = "";
            document.getElementById("logNote").value = "";
        }

        function switchUserProfile() {
            const selectedUser = document.getElementById("userSelect").value;
            renderFeed(selectedUser);
        }

        renderFeed("user1");
    </script>
</body>
</html>
